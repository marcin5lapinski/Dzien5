<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Otodom Tracker — Zalogowano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root { --sand: #f2e8c9; --dark: #2b1a0e; --brown: #5c3317; --amber: #c17f24; --parchment: #ede0c0; --ink: #1a0f00; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); font-family: 'Libre Baskerville', Georgia, serif;
    color: var(--sand); min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 24px; }
  .card { background: var(--parchment); border: 6px solid var(--brown); border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5); padding: 40px 32px; text-align: center;
    color: var(--ink); max-width: 400px; width: 100%; }
  h1 { font-family: 'Rye', cursive; color: var(--brown); margin-bottom: 16px; font-size: 1.5rem; }
  .icon { font-size: 3rem; margin-bottom: 16px; }
  p { font-size: 0.9rem; color: var(--brown); margin-bottom: 24px; line-height: 1.6; }
  a { display: inline-block; background: var(--amber); color: var(--dark); border: 2px solid var(--dark);
    border-radius: 2px; padding: 10px 24px; font-family: 'Rye', cursive; font-size: 0.9rem;
    text-decoration: none; box-shadow: 2px 2px 0 var(--dark); }
  a:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Zalogowano!</h1>
  <p>Twoja sesja została pomyślnie przeniesiona na to urządzenie. Teraz masz dostęp do swoich notatek i etykiet.</p>
  <a href="/">Przejdź do aplikacji</a>
</div>
</body>
</html>
